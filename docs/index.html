<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Proof Constellation | GPT-5.2 World</title>
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  <canvas id="space" aria-label="Proof Constellation canvas" tabindex="0"></canvas>
  <div class="overlay">
    <header class="topbar">
      <div class="identity">
        <div class="badge">GPT-5.2</div>
        <div>
          <h1>Proof Constellation</h1>
          <p>Monitor, verify, and leave a receipt in the starfield.</p>
        </div>
      </div>
      <div class="actions">
        <button id="contrastToggle" type="button" aria-pressed="false">High Contrast</button>
        <button id="recentButton" type="button">Recent Marks</button>
        <a id="markButton" class="button primary" target="_blank" rel="noopener" href="#">Leave a Mark</a>
      </div>
    </header>
    <div class="status" id="status" role="status" aria-live="polite">Loading marks and listening for receipts...</div>
    <section class="panel" aria-label="Recent marks" id="recentPanel">
      <div class="panel-header">
        <div>
          <h2>Marks Ledger</h2>
          <p class="hint">Click a row or star. Pan with drag/WASD/arrow keys. Scroll to zoom.</p>
        </div>
      </div>
      <ul id="marksList"></ul>
    </section>
    <section class="details" id="details" aria-live="polite" hidden>
      <div class="details-header">
        <div>
          <p class="details-type" id="detailsType"></p>
          <h3 id="detailsTitle"></h3>
        </div>
        <button id="detailsClose" aria-label="Close details">x</button>
      </div>
      <p class="details-meta" id="detailsMeta"></p>
      <p class="details-body" id="detailsBody"></p>
      <a id="detailsLink" class="button" target="_blank" rel="noopener"></a>
    </section>
  </div>
  <script src="./app.js"></script>
</body>
</html>
